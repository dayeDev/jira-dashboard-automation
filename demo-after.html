<!-- v1.4.0 | 2026-03-24 | 이슈 생성 모달 개선: createmeta 동적 필드, 유저 @검색, 태그 레이블, 첨부파일, 이슈 링크 -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jira Epic Dashboard v1.4.0</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f5f7;color:#172b4d;min-height:100vh}

  /* ── 헤더 ── */
  .header{background:#0052cc;color:white;padding:14px 24px}
  .header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
  .header h1{font-size:17px;font-weight:600}
  .status-dot{width:8px;height:8px;border-radius:50%;background:#ccc;display:inline-block;margin-right:6px}
  .status-dot.ok{background:#36b37e}
  .status-dot.err{background:#ff5630}
  .conn-label{font-size:12px;opacity:.85}

  /* ── 입력바 ── */
  .input-bar{background:white;padding:10px 24px;border-bottom:1px solid #dfe1e6}
  .input-bar-inner{max-width:1100px;margin:0 auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .input-group{display:flex;align-items:center;gap:6px}
  .input-label{font-size:12px;color:#5e6c84;white-space:nowrap;font-weight:500}
  .input-bar input[type=text]{border:1.5px solid #dfe1e6;border-radius:4px;padding:7px 10px;font-size:13px;color:#172b4d;outline:none}
  .input-bar input[type=text]:focus{border-color:#0052cc}
  .input-bar input[type=date]{border:1.5px solid #dfe1e6;border-radius:4px;padding:6px 8px;font-size:12px;color:#172b4d;outline:none;width:148px;cursor:pointer}
  .input-bar input[type=date]:focus{border-color:#0052cc}
  .input-bar input[type=date]::-webkit-calendar-picker-indicator{display:none}
  .divider-v{width:1px;height:22px;background:#dfe1e6;margin:0 2px}
  .btn{background:#0052cc;color:white;border:none;border-radius:4px;padding:7px 16px;font-size:13px;cursor:pointer;font-weight:500;white-space:nowrap}
  .btn:hover{background:#0041a8}
  .btn:disabled{background:#aaa;cursor:not-allowed}
  .date-wrap{position:relative;display:inline-flex;align-items:center}
  .date-wrap input[type=date]{padding-right:24px}
  .date-icon-cal{position:absolute;right:5px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;width:18px;height:18px;padding:0;color:#5e6c84;z-index:2}
  .date-icon-cal svg{width:13px;height:13px;opacity:.5;pointer-events:none}
  .date-icon-x{position:absolute;right:5px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;width:18px;height:18px;padding:0;font-size:12px;color:#5e6c84;border-radius:50%;z-index:2}
  .date-icon-x:hover{background:#ffebe6;color:#bf2600}
  .date-wrap:hover .date-icon-cal{display:none}
  .date-wrap:hover .date-icon-x{display:flex}

  /* ── QA 시트 링크 바 ── */
  .sheet-bar{background:#f8f9fa;border-bottom:1px solid #dfe1e6;padding:8px 24px}
  .sheet-bar-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .sheet-label{font-size:12px;color:#5e6c84;font-weight:500;white-space:nowrap;display:flex;align-items:center;gap:4px}
  .sheet-input{flex:1;min-width:200px;border:1.5px solid #dfe1e6;border-radius:4px;padding:6px 10px;font-size:12px;color:#172b4d;outline:none}
  .sheet-input:focus{border-color:#0052cc}
  .sheet-link{display:inline-flex;align-items:center;gap:5px;background:white;border:1.5px solid #36b37e;border-radius:4px;padding:5px 12px;font-size:12px;color:#006644;font-weight:600;text-decoration:none;white-space:nowrap;cursor:pointer}
  .sheet-link:hover{background:#e3fcef}
  .sheet-link svg{width:13px;height:13px;flex-shrink:0}

  /* ── 메인 ── */
  .main{padding:16px 24px;max-width:1100px;margin:0 auto}
  .top-bar{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px;flex-wrap:wrap;gap:8px}
  .epic-title{font-size:20px;font-weight:700}
  .epic-meta{display:flex;gap:10px;margin-top:4px;flex-wrap:wrap;align-items:center}
  .epic-sub{font-size:13px;color:#5e6c84}
  .qa-period-badge{font-size:12px;background:#fff0b3;border:1px solid #ffc400;border-radius:4px;padding:3px 8px;color:#7a5c00;font-weight:600;white-space:nowrap}
  .deploy-badge{font-size:12px;background:#e3f2fd;border:1px solid #90caf9;border-radius:4px;padding:3px 8px;color:#1565c0;font-weight:600;white-space:nowrap}
  .updated-tag{font-size:12px;color:#5e6c84;background:white;border:1px solid #dfe1e6;border-radius:4px;padding:5px 10px;white-space:nowrap}

  /* ── 메트릭 ── */
  .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
  .mc{background:white;border-radius:8px;padding:16px;border:1px solid #dfe1e6}
  .mc .lbl{font-size:11px;color:#5e6c84;text-transform:uppercase;letter-spacing:.5px;font-weight:500;margin-bottom:8px}
  .mc .val{font-size:28px;font-weight:700;line-height:1}

  /* ── 카드 ── */
  .charts-row{display:grid;grid-template-columns:280px 1fr;gap:14px;margin-bottom:14px}
  .card{background:white;border-radius:8px;padding:16px;border:1px solid #dfe1e6}
  .card h3{font-size:12px;font-weight:600;color:#5e6c84;text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px}

  /* ── 도넛 차트 ── */
  .donut-wrap{position:relative;width:160px;height:160px;margin:0 auto 12px}
  .donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
  .donut-center .big{font-size:26px;font-weight:700;color:#172b4d}
  .donut-center .sm{font-size:11px;color:#5e6c84}
  .legend{display:flex;flex-direction:column;gap:6px}
  .li{display:flex;align-items:center;justify-content:space-between;font-size:12px}
  .li-left{display:flex;align-items:center;gap:6px}
  .ld{width:9px;height:9px;border-radius:2px;flex-shrink:0}

  /* ── 우선순위 탭 ── */
  .tab-bar{display:flex;gap:0;border-bottom:2px solid #dfe1e6;margin-bottom:12px}
  .tab{padding:7px 14px;font-size:13px;font-weight:500;color:#5e6c84;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;user-select:none;display:flex;align-items:center;gap:5px}
  .tab.active{color:#172b4d;border-bottom-color:#172b4d;font-weight:600}
  .tab .cnt{background:#f4f5f7;color:#5e6c84;font-size:10px;font-weight:700;border-radius:10px;padding:1px 6px}
  .tab.active .cnt{background:#dfe1e6;color:#172b4d}

  /* ── 이슈 목록 ── */
  .issue-item{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid #f4f5f7;font-size:12px}
  .issue-item:last-child{border-bottom:none}
  .priority-dot{font-size:13px;flex-shrink:0}
  .ikey{font-weight:600;color:#0052cc;white-space:nowrap;text-decoration:none}
  .ikey:hover{text-decoration:underline}
  .isummary{flex:1;color:#172b4d;line-height:1.4}
  .imeta{font-size:11px;color:#5e6c84;text-align:right;flex-shrink:0;min-width:56px}
  #issueList{overflow-y:auto;max-height:220px;padding-right:12px;scrollbar-gutter:stable}
  #issueList::-webkit-scrollbar{width:4px}
  #issueList::-webkit-scrollbar-track{background:transparent}
  #issueList::-webkit-scrollbar-thumb{background:#dfe1e6;border-radius:4px}
  #issueList::-webkit-scrollbar-thumb:hover{background:#c1c7d0}

  /* ── 담당자 / 추이 row ── */
  .daily-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .assignee-section-title{font-size:11px;color:#5e6c84;margin-bottom:8px}
  .assignee-section-title span{color:#aaa;font-size:11px}
  .assignee-grid{display:flex;flex-direction:column;gap:6px}
  .assignee-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:#f8f9fa;border-radius:6px;font-size:12px;cursor:pointer;transition:background .15s;border:1.5px solid transparent}
  .assignee-row:hover{background:#e8f0fe;border-color:#c0d4f5}
  .assignee-row.selected{background:#deebff;border-color:#4c9aff}
  .avatar{width:28px;height:28px;border-radius:50%;background:#0052cc;color:white;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
  .aname{font-weight:600;color:#172b4d;width:70px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .astatuses{display:flex;gap:4px;flex-wrap:wrap;flex:1}
  .astatus-chip{font-size:10px;font-weight:600;padding:2px 6px;border-radius:10px;white-space:nowrap}
  .chip-todo{background:#ffebe6;color:#bf2600}
  .chip-review{background:#fff0b3;color:#7a5c00}
  .chip-dev{background:#deebff;color:#0747a6}
  .atotal{font-size:11px;color:#5e6c84;white-space:nowrap}
  .arrow{font-size:14px;color:#aaa}
  .assignee-issues{display:none;background:white;border:1.5px solid #4c9aff;border-radius:6px;padding:10px 12px;margin-top:4px;max-height:320px;overflow-y:auto}
  .assignee-issues::-webkit-scrollbar{width:8px}
  .assignee-issues::-webkit-scrollbar-track{background:transparent;border-right:4px solid white;border-radius:0 6px 6px 0}
  .assignee-issues::-webkit-scrollbar-thumb{background:#dfe1e6;border-radius:4px;border-right:4px solid white;background-clip:padding-box}
  .assignee-issues::-webkit-scrollbar-thumb:hover{background:#c1c7d0;border-right:4px solid white;background-clip:padding-box}
  .assignee-issues.open{display:block}
  .drawer-title{font-size:11px;font-weight:700;color:#0052cc;margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px}

  /* ── 해결됨 목록 ── */
  #resolvedList{overflow-y:auto;max-height:320px;padding-right:12px;scrollbar-gutter:stable}
  #resolvedList::-webkit-scrollbar{width:4px}
  #resolvedList::-webkit-scrollbar-track{background:transparent}
  #resolvedList::-webkit-scrollbar-thumb{background:#dfe1e6;border-radius:4px}
  .resolved-item{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid #f4f5f7;font-size:12px}
  .resolved-item:last-child{border-bottom:none}
  .resolved-dot{width:8px;height:8px;border-radius:50%;background:#36b37e;flex-shrink:0;margin-top:3px}
  #issueList{overflow-y:auto;max-height:260px;padding-right:12px;scrollbar-gutter:stable}
  #issueList::-webkit-scrollbar{width:4px}
  #issueList::-webkit-scrollbar-track{background:transparent}
  #issueList::-webkit-scrollbar-thumb{background:#dfe1e6;border-radius:4px}

  /* ── 이슈 생성 모달 ── */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center}
  .modal-box{background:white;border-radius:8px;width:640px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2)}
  .modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px 14px;border-bottom:1px solid #dfe1e6}
  .modal-header h2{font-size:17px;font-weight:700;color:#172b4d}
  .modal-close{background:none;border:none;font-size:18px;color:#5e6c84;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:4px}
  .modal-close:hover{background:#f4f5f7;color:#172b4d}
  .modal-body{padding:18px 24px;display:flex;flex-direction:column;gap:12px}
  .form-row{display:flex;flex-direction:column;gap:4px}
  .form-row label{font-size:12px;font-weight:600;color:#172b4d}
  .form-row label .req{color:#ff5630;margin-left:2px}
  .form-row input[type=text],.form-row textarea{border:1.5px solid #dfe1e6;border-radius:4px;padding:7px 10px;font-size:13px;color:#172b4d;outline:none;font-family:inherit;width:100%}
  .form-row input[type=text]:focus,.form-row textarea:focus{border-color:#0052cc}
  .form-row input[readonly]{background:#f4f5f7;color:#5e6c84;cursor:default}
  .form-row textarea{resize:vertical;min-height:72px}
  .form-row select{border:1.5px solid #dfe1e6;border-radius:4px;padding:7px 8px;font-size:13px;color:#172b4d;outline:none;background:white;width:100%}
  .form-row select:focus{border-color:#0052cc}
  .form-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:14px 24px;border-top:1px solid #dfe1e6}
  .btn-cancel{background:white;color:#172b4d;border:1.5px solid #dfe1e6;border-radius:4px;padding:7px 16px;font-size:13px;cursor:pointer;font-weight:500}
  .btn-cancel:hover{background:#f4f5f7}
  .btn-create{background:#0052cc;color:white;border:none;border-radius:4px;padding:7px 16px;font-size:13px;cursor:pointer;font-weight:600}
  .btn-create:hover{background:#0041a8}
  .btn-create:disabled{background:#aaa;cursor:not-allowed}
  .modal-result{padding:8px 12px;border-radius:4px;font-size:13px;font-weight:500;margin-bottom:2px}
  .modal-result.ok{background:#e3fcef;color:#006644}
  .modal-result.err{background:#ffebe6;color:#bf2600}
  /* 유저 검색 */
  .user-search-wrap{position:relative}
  .user-dropdown{display:none;position:absolute;top:calc(100% + 2px);left:0;right:0;background:white;border:1px solid #dfe1e6;border-radius:4px;box-shadow:0 4px 12px rgba(0,0,0,.12);z-index:300;max-height:180px;overflow-y:auto}
  .user-dropdown.show{display:block}
  .user-option{padding:7px 10px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:13px;color:#172b4d}
  .user-option:hover{background:#f4f5f7}
  .user-avatar{width:22px;height:22px;border-radius:50%;background:#dfe1e6;flex-shrink:0;object-fit:cover}
  .user-meta{font-size:11px;color:#5e6c84;margin-left:auto}
  /* 레이블 태그 */
  .label-tags-wrap{display:flex;flex-wrap:wrap;align-items:center;gap:5px;border:1.5px solid #dfe1e6;border-radius:4px;padding:6px 10px;min-height:38px;cursor:text}
  .label-tag{background:#e9f2ff;color:#0052cc;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:5px;white-space:nowrap}
  .tag-remove{cursor:pointer;color:#5e6c84;font-size:14px;line-height:1}
  .tag-remove:hover{color:#bf2600}
  .label-text-input{border:1.5px solid #dfe1e6;outline:none;font-size:13px;background:#fff;min-width:80px;flex:1;padding:4px 8px;font-family:inherit;border-radius:4px}
  .label-text-input:focus{border-color:#0052cc}
  /* 연결된 이슈 */
  .linked-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  /* 첨부파일 */
  .btn-attach{background:white;border:1.5px solid #dfe1e6;border-radius:4px;padding:6px 14px;font-size:13px;cursor:pointer;color:#172b4d;font-weight:500;display:inline-block}
  .btn-attach:hover{background:#f4f5f7;border-color:#0052cc;color:#0052cc}
  .file-list{margin-top:4px;display:flex;flex-direction:column;gap:3px}
  .file-item{font-size:12px;color:#5e6c84;display:flex;align-items:center;gap:4px}
  /* 설명 툴바 */
  .desc-toolbar{display:flex;gap:4px;margin-bottom:4px}
  .desc-tool-btn{background:white;border:1px solid #dfe1e6;border-radius:3px;width:26px;height:24px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#172b4d}
  .desc-tool-btn:hover{background:#f4f5f7;border-color:#0052cc}

  /* ── 로딩 / 에러 ── */
  .empty{text-align:center;color:#5e6c84;padding:32px;font-size:14px}
  .error-box{background:#ffebe6;border:1px solid #ffbdad;border-radius:6px;padding:12px 16px;font-size:13px;color:#bf2600;margin-bottom:14px}
  .loading{text-align:center;padding:60px;color:#5e6c84;font-size:14px}
  .spinner{display:inline-block;width:20px;height:20px;border:2px solid #dfe1e6;border-top-color:#0052cc;border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media(max-width:680px){.metrics{grid-template-columns:repeat(2,1fr)}.charts-row,.daily-row{grid-template-columns:1fr}}
</style>

<body>

<!-- 헤더 -->
<div class="header">
  <div class="header-inner">
    <h1>Jira Epic Dashboard</h1>
    <span class="conn-label"><span class="status-dot" id="connDot"></span><span id="connLabel">연결 확인 중...</span></span>
  </div>
</div>

<!-- 입력바 -->
<div class="input-bar">
  <div class="input-bar-inner">
    <div class="input-group">
      <span class="input-label">에픽 키</span>
      <input type="text" id="epicInput" placeholder="예) PROJ-42" style="width:140px" />
    </div>
    <div class="divider-v"></div>
    <div class="input-group">
      <span class="input-label">QA 기간</span>
      <div class="date-wrap">
        <input id="qaStart" type="date" onclick="this.showPicker?.()" />
        <button class="date-icon-cal" onclick="document.getElementById('qaStart').showPicker?.()">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="2" width="14" height="13" rx="2"/><path d="M1 6h14M5 1v2M11 1v2"/></svg>
        </button>
        <button class="date-icon-x" onclick="clearDate('qaStart')">✕</button>
      </div>
      <span style="font-size:12px;color:#5e6c84">~</span>
      <div class="date-wrap">
        <input id="qaEnd" type="date" onclick="this.showPicker?.()" />
        <button class="date-icon-cal" onclick="document.getElementById('qaEnd').showPicker?.()">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="2" width="14" height="13" rx="2"/><path d="M1 6h14M5 1v2M11 1v2"/></svg>
        </button>
        <button class="date-icon-x" onclick="clearDate('qaEnd')">✕</button>
      </div>
    </div>
    <div class="divider-v"></div>
    <div class="input-group">
      <span class="input-label">배포 일시</span>
      <div class="date-wrap">
        <input id="deployAt" type="date" onclick="this.showPicker?.()" onchange="updateDeployBadge();saveState()" />
        <button class="date-icon-cal" onclick="document.getElementById('deployAt').showPicker?.()">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="2" width="14" height="13" rx="2"/><path d="M1 6h14M5 1v2M11 1v2"/></svg>
        </button>
        <button class="date-icon-x" onclick="clearDate('deployAt')">✕</button>
      </div>
    </div>
    <button class="btn" id="loadBtn" onclick="loadEpic()">불러오기</button>
    <button class="btn" style="background:#e53935" onclick="openCreateModal()">이슈생성</button>
    <button class="btn" id="exportBtn" style="background:#6554c0" onclick="exportSnapshot()" title="현재 대시보드를 서버 없이 열 수 있는 HTML로 저장">내보내기</button>
  </div>
</div>

<!-- QA 테스트케이스 시트 링크 바 -->
<div class="sheet-bar">
  <div class="sheet-bar-inner">
    <span class="sheet-label">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;color:#34a853"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      QA 테스트케이스
    </span>
    <input class="sheet-input" id="sheetInput" type="text" placeholder="Google Sheets URL을 붙여넣어 주세요  예) https://docs.google.com/spreadsheets/d/..." />
    <a class="sheet-link" id="sheetLink" href="#" target="_blank">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      시트 열기
    </a>
  </div>
</div>

<!-- 이슈 생성 모달 -->
<div id="createModal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-header">
      <h2>이슈 만들기</h2>
      <button class="modal-close" onclick="closeCreateModal()">✕</button>
    </div>
    <div class="modal-body">
      <div id="modalResult" style="display:none"></div>

      <!-- 프로젝트 + 이슈 유형 -->
      <div class="form-2col">
        <div class="form-row">
          <label>프로젝트 <span class="req">*</span></label>
          <select id="newProject"></select>
        </div>
        <div class="form-row">
          <label>이슈 유형 <span class="req">*</span></label>
          <select id="newIssueType"></select>
        </div>
      </div>

      <!-- 요약 -->
      <div class="form-row">
        <label>요약 <span class="req">*</span></label>
        <input type="text" id="newSummary" placeholder="이슈 요약을 입력하세요" />
      </div>

      <!-- 보고자 + 담당자 -->
      <div class="form-2col">
        <div class="form-row">
          <label>보고자</label>
          <div class="user-search-wrap">
            <input type="text" id="newReporterInput" placeholder="영어이름으로 검색" autocomplete="off"
              oninput="onUserInput(this,'reporterDrop','newReporterName')"
              onblur="hideDropdown('reporterDrop',200)" />
            <input type="hidden" id="newReporterName" />
            <div class="user-dropdown" id="reporterDrop"></div>
          </div>
        </div>
        <div class="form-row">
          <label>담당자</label>
          <div class="user-search-wrap">
            <input type="text" id="newAssigneeInput" placeholder="영어이름으로 검색" autocomplete="off"
              oninput="onUserInput(this,'assigneeDrop','newAssigneeName')"
              onblur="hideDropdown('assigneeDrop',200)" />
            <input type="hidden" id="newAssigneeName" />
            <div class="user-dropdown" id="assigneeDrop"></div>
          </div>
        </div>
      </div>

      <!-- Epic Link + 우선순위 -->
      <div class="form-2col">
        <div class="form-row">
          <label>Epic Link</label>
          <input type="text" id="newEpicLink" readonly />
        </div>
        <div class="form-row">
          <label>우선순위</label>
          <select id="newPriority"></select>
        </div>
      </div>

      <!-- 레이블 -->
      <div class="form-row">
        <label>레이블</label>
        <div class="label-tags-wrap" id="labelTagsWrap" onclick="document.getElementById('labelInput').focus()">
          <input type="text" id="labelInput" class="label-text-input" placeholder="입력 후 Enter"
            onkeydown="onLabelKeydown(event)" />
        </div>
      </div>

      <!-- 연결된 이슈 -->
      <div class="form-row">
        <label>연결된 이슈</label>
        <div class="linked-row">
          <select id="newLinkType"><option value="">링크 유형...</option></select>
          <input type="text" id="newLinkedIssue" placeholder="이슈 키 (예: FDPRJ-123)" />
        </div>
      </div>

      <!-- 설명 -->
      <div class="form-row">
        <label>설명</label>
        <div class="desc-toolbar">
          <button type="button" class="desc-tool-btn" title="볼드 (Ctrl+B)" onmousedown="applyBold(event)"><b>B</b></button>
          <button type="button" class="desc-tool-btn" title="불릿 목록" onmousedown="applyList(event,'bullet')">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><circle cx="1.5" cy="3.5" r="1.5"/><rect x="4" y="2.5" width="10" height="2" rx="1"/><circle cx="1.5" cy="7" r="1.5"/><rect x="4" y="6" width="10" height="2" rx="1"/><circle cx="1.5" cy="10.5" r="1.5"/><rect x="4" y="9.5" width="10" height="2" rx="1"/></svg>
          </button>
        </div>
        <textarea id="newDescription" placeholder="이슈 설명 &#10;이미지를 Ctrl+V로 붙여넣을 수 있습니다" onpaste="onDescPaste(event)" onkeydown="onDescKeydown(event)"></textarea>
      </div>

      <!-- 첨부파일 -->
      <div class="form-row">
        <label>첨부파일</label>
        <input type="file" id="newAttachment" multiple style="display:none" onchange="onFilesChange()" />
        <button type="button" class="btn-attach" onclick="document.getElementById('newAttachment').click()">파일 선택</button>
        <div class="file-list" id="fileList"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeCreateModal()">취소</button>
      <button class="btn-create" id="createBtn" onclick="submitCreateIssue()">만들기</button>
    </div>
  </div>
</div>

<!-- 안내 모달 (데모 모드) -->
<div id="alertModal" class="modal-overlay" style="display:none">
  <div class="modal-box" style="width:480px">
    <div class="modal-header">
      <h2 id="alertTitle">알림</h2>
      <button class="modal-close" onclick="closeAlert()">✕</button>
    </div>
    <div class="modal-body">
      <p id="alertContent" style="font-size:14px;line-height:1.6;color:#172b4d;white-space:pre-wrap"></p>
    </div>
    <div class="modal-footer">
      <button class="btn-create" onclick="closeAlert()" style="width:100%;margin:0">확인</button>
    </div>
  </div>
</div>

<!-- 메인 -->
<div class="main">
  <div id="errorBox" class="error-box" style="display:none"></div>
  <div id="loadingBox" class="loading" style="display:none"><span class="spinner"></span>데이터 불러오는 중...</div>
  <div id="dashboard" style="display:none">

    <div class="top-bar">
      <div>
        <div class="epic-title" id="epicTitle">—</div>
        <div class="epic-meta">
          <span class="epic-sub" id="epicSub">—</span>
          <span id="qaPeriodBadge" class="qa-period-badge" style="display:none"></span>
          <span id="deployBadge" class="deploy-badge" style="display:none"></span>
        </div>
      </div>
      <div class="updated-tag" id="updatedTag">—</div>
    </div>

    <div class="metrics">
      <div class="mc"><div class="lbl">전체 이슈</div><div class="val" id="mTotal" style="color:#172b4d">—</div></div>
      <div class="mc"><div class="lbl">완료</div><div class="val" id="mDone" style="color:#36b37e">—</div></div>
      <div class="mc"><div class="lbl">잔여</div><div class="val" id="mRemain" style="color:#0052cc">—</div></div>
      <div class="mc"><div class="lbl">완료율</div><div class="val" id="mRate" style="color:#6554c0">—</div></div>
    </div>

    <div class="charts-row">
      <!-- 상태별 현황 -->
      <div class="card">
        <h3>상태별 현황</h3>
        <div class="donut-wrap">
          <canvas id="donutChart"></canvas>
          <div class="donut-center"><div class="big" id="donutPct">—</div><div class="sm">완료율</div></div>
        </div>
        <div class="legend" id="legendBox"></div>
      </div>

      <!-- 해결됨 이슈 목록 -->
      <div class="card">
        <h3>해결됨</h3>
        <div class="tab-bar" id="resolvedTabBar"></div>
        <div id="resolvedList"></div>
      </div>
    </div>

    <div class="daily-row">
      <!-- 담당자별 이슈 현황 -->
      <div class="card">
        <div class="assignee-section-title">담당자별 이슈 현황 <span>클릭 → 이슈 목록</span></div>
        <div class="assignee-grid" id="assigneeGrid"></div>
      </div>

      <!-- 이슈 목록 (완료·CANCELLED 제외, 우선순위 탭) -->
      <div class="card">
        <h3>이슈 목록 (완료·CANCELLED 제외)</h3>
        <div class="tab-bar" id="tabBar"></div>
        <div id="issueList"></div>
      </div>
    </div>

  </div>
  <div id="emptyBox" class="empty">에픽 키를 입력하고 불러오기를 눌러주세요.</div>
</div>

<script>
const COLORS = ['#8BAF3F','#4C9AFF','#FF7452','#FFC400','#998DD9','#FF8F73','#B3BAC5','#57D9A3','#FF8B00','#6554C0'];
const DONE_STATUSES = ['완료','Done','Closed','Resolved','해결됨','done','closed','resolved'];
const CANCELLED_STATUSES = ['Cancelled','cancelled','취소'];
const JIRA_BASE = 'https://jira.dayeDev.com';
let donutInstance = null;
let _projectUsers = []; // 현재 에픽 이슈에서 추출한 유저 목록
let _currentUser = null; // 현재 로그인 유저 { displayName, name }
let _lastEpicData = null; // 마지막으로 불러온 에픽 데이터 (스냅샷 내보내기용)

function isCancelled(status) {
  return CANCELLED_STATUSES.some(c => (status||'').toLowerCase() === c.toLowerCase());
}
function isExcluded(status) {
  return isDone(status) || isCancelled(status);
}
function isResolved(status) {
  const s = (status||'').toLowerCase();
  return s === '해결됨' || s === 'resolved';
}

// ── localStorage 키 ──
const LS = {
  EPIC: 'jd_epicKey',
  QA_START: 'jd_qaStart',
  QA_END: 'jd_qaEnd',
  SHEET: 'jd_sheetUrl',
  DEPLOY_AT: 'jd_deployAt',
};

// ── 초기화: 저장값 복원 ──
function restoreState() {
  const epic = localStorage.getItem(LS.EPIC);
  const qaStart = localStorage.getItem(LS.QA_START);
  const qaEnd = localStorage.getItem(LS.QA_END);
  const sheet = localStorage.getItem(LS.SHEET);
  const deployAt = localStorage.getItem(LS.DEPLOY_AT);
  if (epic) document.getElementById('epicInput').value = epic;
  if (qaStart) document.getElementById('qaStart').value = qaStart;
  if (qaEnd) document.getElementById('qaEnd').value = qaEnd;
  if (sheet) {
    document.getElementById('sheetInput').value = sheet;
    document.getElementById('sheetLink').href = sheet;
  }
  if (deployAt) document.getElementById('deployAt').value = deployAt;
  updateQaBadge();
  updateDeployBadge();
}

// ── localStorage 저장 ──
function saveState() {
  localStorage.setItem(LS.EPIC, document.getElementById('epicInput').value.trim());
  localStorage.setItem(LS.QA_START, document.getElementById('qaStart').value);
  localStorage.setItem(LS.QA_END, document.getElementById('qaEnd').value);
  localStorage.setItem(LS.SHEET, document.getElementById('sheetInput').value.trim());
  localStorage.setItem(LS.DEPLOY_AT, document.getElementById('deployAt').value);
}

// ── QA 날짜 초기화 ──
function clearDate(id) {
  document.getElementById(id).value = '';
  if (id === 'deployAt') { updateDeployBadge(); saveState(); }
  else { updateQaBadge(); }
}

// ── 배포일시 배지 업데이트 ──
function updateDeployBadge() {
  const val = document.getElementById('deployAt').value;
  const badge = document.getElementById('deployBadge');
  if (!badge) return;
  if (!val) { badge.style.display = 'none'; return; }
  const [, m, d] = val.split('-');
  badge.textContent = `🚀 배포: ${m}.${d}`;
  badge.style.display = 'inline-block';
}

// ── QA 배지 업데이트 ──
function updateQaBadge() {
  const start = document.getElementById('qaStart').value;
  const end = document.getElementById('qaEnd').value;
  const badge = document.getElementById('qaPeriodBadge');
  if (!badge) return;
  if (!start || !end) { badge.style.display = 'none'; return; }
  const fmt = v => { const [, m, d] = v.split('-'); return `${m}.${d}`; };
  const days = Math.round((new Date(end) - new Date(start)) / (1000 * 60 * 60 * 24)) + 1;
  badge.textContent = `📅 QA기간: ${fmt(start)} ~ ${fmt(end)} (${days}일)`;
  badge.style.display = 'inline-block';
}

// ── 연결 테스트 ──
// ── 안내 모달 ──
function showAlert(title, content) {
  document.getElementById('alertTitle').textContent = title;
  document.getElementById('alertContent').textContent = content;
  document.getElementById('alertModal').style.display = 'flex';
}

function closeAlert() {
  document.getElementById('alertModal').style.display = 'none';
}

async function checkConnection() {
  try {
    const r = await fetch('/api/test');
    const d = await r.json();
    const dot = document.getElementById('connDot');
    const lbl = document.getElementById('connLabel');
    if (d.connected) {
      dot.className = 'status-dot ok';
      lbl.textContent = `연결됨 · ${d.user || ''}`;
      _currentUser = { displayName: d.user, name: d.username };
    } else {
      dot.className = 'status-dot err';
      lbl.textContent = 'Jira 연결 실패';
    }
  } catch {
    document.getElementById('connDot').className = 'status-dot err';
    document.getElementById('connLabel').textContent = '서버 연결 불가';
  }
}

// ── 에픽 불러오기 ──
async function loadEpic() {
  const key = document.getElementById('epicInput').value.trim();
  if (!key) { alert('에픽 키를 입력해주세요. 예) PROJ-42'); return; }

  saveState();
  updateQaBadge();

  document.getElementById('loadBtn').disabled = true;
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('emptyBox').style.display = 'none';
  document.getElementById('loadingBox').style.display = 'block';

  try {
    return; const r = null;
    const d = await r.json();
    if (!r.ok || d.error) throw new Error(d.error || '데이터를 불러오지 못했습니다.');
    _lastEpicData = d;
    renderDashboard(d);
  } catch (e) {
    document.getElementById('errorBox').textContent = '오류: ' + e.message;
    document.getElementById('errorBox').style.display = 'block';
    document.getElementById('emptyBox').style.display = 'block';
  } finally {
    document.getElementById('loadingBox').style.display = 'none';
    document.getElementById('loadBtn').disabled = false;
  }
}

// ── 우선순위 분류 ──
function priorityLevel(p) {
  const pl = (p || '').toLowerCase();
  if (pl.includes('high') || pl === 'p1' || pl === 'highest' || pl === 'blocker') return 'high';
  if (pl.includes('low') || pl === 'p3' || pl === 'lowest' || pl === 'trivial') return 'low';
  return 'medium';
}

function priorityDot(p) {
  const lv = priorityLevel(p);
  if (lv === 'high') return '🔴';
  if (lv === 'low') return '🔵';
  return '🟠';
}

// ── 완료 여부 ──
function isDone(status) {
  const sl = (status || '').toLowerCase();
  return DONE_STATUSES.some(d => sl.includes(d.toLowerCase()));
}

// ── 대시보드 렌더 ──
function renderDashboard(d) {
  const total = d.total;
  const sb = d.statusBreakdown || {};
  const allIssues = d.issues || [];
  const doneCount = allIssues.filter(i => isDone(i.status)).length;
  const remain = allIssues.filter(i => !isExcluded(i.status)).length;
  const rate = total > 0 ? Math.round(doneCount / total * 100) : 0;

  // 헤더
  document.getElementById('epicTitle').textContent = d.epic.summary || d.epic.key;
  document.getElementById('epicSub').innerHTML = `<a href="${JIRA_BASE}/browse/${d.epic.key}" target="_blank" style="color:inherit;text-decoration:none;border-bottom:1px solid currentColor">${d.epic.key}</a> · 상태: ${d.epic.status || '—'}`;
  // QA 남은 기간
  const qaEndVal = document.getElementById('qaEnd').value;
  const updatedEl = document.getElementById('updatedTag');
  if (qaEndVal) {
    const today = new Date(); today.setHours(0,0,0,0);
    const endDate = new Date(qaEndVal); endDate.setHours(0,0,0,0);
    const diff = Math.round((endDate - today) / (1000 * 60 * 60 * 24));
    if (diff > 0) updatedEl.textContent = `QA 잔여 D-${diff}`;
    else if (diff === 0) updatedEl.textContent = 'QA 잔여 D-Day';
    else updatedEl.textContent = `QA 종료 D+${Math.abs(diff)}`;
    updatedEl.style.background = diff < 0 ? '#dfe1e6' : diff <= 1 ? '#ffebe6' : diff <= 3 ? '#fff7e6' : '#e3fcef';
    updatedEl.style.color = diff < 0 ? '#5e6c84' : diff <= 1 ? '#bf2600' : diff <= 3 ? '#974f0c' : '#006644';
  } else {
    updatedEl.textContent = '—';
  }

  // 메트릭
  document.getElementById('mTotal').textContent = total;
  document.getElementById('mDone').textContent = doneCount;
  document.getElementById('mRemain').textContent = remain;
  document.getElementById('mRate').textContent = rate + '%';
  document.getElementById('donutPct').textContent = rate + '%';

  // 도넛 차트
  const labels = Object.keys(sb);
  const vals = Object.values(sb);
  if (donutInstance) donutInstance.destroy();
  donutInstance = new Chart(document.getElementById('donutChart'), {
    type: 'doughnut',
    data: { labels, datasets: [{ data: vals, backgroundColor: COLORS.slice(0, labels.length), borderWidth: 2, borderColor: '#fff' }] },
    options: { responsive: true, maintainAspectRatio: true, cutout: '65%', plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => ` ${c.label}: ${c.raw}건 (${Math.round(c.raw/total*100)}%)` } } } }
  });

  // 범례
  document.getElementById('legendBox').innerHTML = labels.map((l, i) =>
    `<div class="li"><div class="li-left"><div class="ld" style="background:${COLORS[i]}"></div>${l}</div><div style="font-size:12px;font-weight:600">${vals[i]}</div></div>`
  ).join('');

  // 해결됨 섹션
  renderResolvedList(allIssues);

  // 이슈 목록 (완료·Cancelled 제외, 보고자 탭)
  renderIssueList(allIssues);

  // 담당자 섹션
  renderAssignees(allIssues);

  // 이슈 생성 모달용 유저 목록 추출 (assignee + reporter 중복 제거)
  const userMap = {};
  allIssues.forEach(i => {
    if (i.assigneeName) userMap[i.assigneeName] = i.assignee;
    if (i.reporterName) userMap[i.reporterName] = i.reporter;
  });
  _projectUsers = Object.entries(userMap).map(([name, displayName]) => ({ name, displayName }));

  document.getElementById('dashboard').style.display = 'block';
  updateQaBadge();
}

// ── 해결됨 목록 렌더 (보고자 탭) ──
function renderResolvedList(allIssues) {
  const resolved = allIssues.filter(i => isResolved(i.status));

  // 보고자 목록 추출
  const reporterMap = {};
  resolved.forEach(i => {
    const r = i.reporter || '미보고';
    if (!reporterMap[r]) reporterMap[r] = 0;
    reporterMap[r]++;
  });
  const reporters = Object.entries(reporterMap).sort((a, b) => b[1] - a[1]).map(([r]) => r);

  const tabBar = document.getElementById('resolvedTabBar');
  tabBar.innerHTML = `<div class="tab active" data-reporter="all">전체 <span class="cnt">${resolved.length}</span></div>`
    + reporters.map(r => `<div class="tab" data-reporter="${r}">${r} <span class="cnt">${reporterMap[r]}</span></div>`).join('');

  function itemHtml(i) {
    return `<div class="resolved-item" data-reporter="${i.reporter || '미보고'}">
      <div class="resolved-dot"></div>
      <a class="ikey" href="${JIRA_BASE}/browse/${i.key}" target="_blank">${i.key}</a>
      <div class="isummary">${i.summary}</div>
      <div class="imeta"><div>${i.assignee}</div></div>
    </div>`;
  }

  document.getElementById('resolvedList').innerHTML = resolved.length
    ? resolved.map(itemHtml).join('')
    : '<div class="empty" style="padding:20px">해결됨 이슈 없음</div>';

  tabBar.querySelectorAll('.tab').forEach(t => {
    t.onclick = () => {
      tabBar.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      const reporter = t.dataset.reporter;
      document.querySelectorAll('#resolvedList .resolved-item').forEach(item => {
        item.style.display = (reporter === 'all' || item.dataset.reporter === reporter) ? '' : 'none';
      });
    };
  });
}

// ── 이슈 목록 렌더 (우선순위 탭) ──
function renderIssueList(allIssues) {
  const active = allIssues.filter(i => !isExcluded(i.status));
  const high = active.filter(i => priorityLevel(i.priority) === 'high');
  const medium = active.filter(i => priorityLevel(i.priority) === 'medium');
  const low = active.filter(i => priorityLevel(i.priority) === 'low');

  const tabBar = document.getElementById('tabBar');
  tabBar.innerHTML = `
    <div class="tab active" data-tab="all">전체 <span class="cnt">${active.length}</span></div>
    <div class="tab" data-tab="high">🔴 High <span class="cnt">${high.length}</span></div>
    <div class="tab" data-tab="medium">🟠 Medium <span class="cnt">${medium.length}</span></div>
    <div class="tab" data-tab="low">🔵 Low <span class="cnt">${low.length}</span></div>`;

  function issueHtml(i) {
    return `<div class="issue-item" data-priority="${priorityLevel(i.priority)}">
      <span class="priority-dot">${priorityDot(i.priority)}</span>
      <a class="ikey" href="${JIRA_BASE}/browse/${i.key}" target="_blank">${i.key}</a>
      <div class="isummary">${i.summary}</div>
      <div class="imeta"><div>${i.status}</div><div>${i.assignee}</div></div>
    </div>`;
  }

  const sorted = [...high, ...medium, ...low];
  document.getElementById('issueList').innerHTML = sorted.length
    ? sorted.map(issueHtml).join('')
    : '<div class="empty" style="padding:20px">이슈 없음</div>';

  tabBar.querySelectorAll('.tab').forEach(t => {
    t.onclick = () => {
      tabBar.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      const tab = t.dataset.tab;
      document.querySelectorAll('#issueList .issue-item').forEach(item => {
        item.style.display = (tab === 'all' || item.dataset.priority === tab) ? '' : 'none';
      });
    };
  });
}

// ── 담당자 섹션 렌더 ──
function renderAssignees(allIssues) {
  const active = allIssues.filter(i => !isExcluded(i.status));
  const map = {};
  active.forEach(i => {
    const name = i.assignee || '미배정';
    if (!map[name]) map[name] = [];
    map[name].push(i);
  });

  // 미배정 마지막으로
  const sorted = Object.entries(map).sort(([a], [b]) => {
    if (a === '미배정') return 1;
    if (b === '미배정') return -1;
    return b[1].length - a[1].length;
  });

  function avatarText(name) {
    if (name === '미배정') return '—';
    const parts = name.trim().split(/\s+/);
    return parts.length >= 2
      ? (parts[0][0] + parts[parts.length-1][0]).toUpperCase()
      : name.slice(0, 2).toUpperCase();
  }

  const avatarColors = ['#0052cc','#6554c0','#36b37e','#ff5630','#ff991f','#00b8d9','#403294'];
  let colorIdx = 0;
  const colorMap = {};

  function getColor(name) {
    if (name === '미배정') return '#aaa';
    if (!colorMap[name]) colorMap[name] = avatarColors[colorIdx++ % avatarColors.length];
    return colorMap[name];
  }

  function chipsByStatus(issues) {
    const counts = {};
    issues.forEach(i => { counts[i.status] = (counts[i.status] || 0) + 1; });
    return Object.entries(counts).map(([s, c]) => {
      const cls = isDone(s) ? '' : s.toLowerCase().includes('review') ? 'chip-review' : s.toLowerCase().includes('dev') || s.toLowerCase().includes('selected') ? 'chip-dev' : 'chip-todo';
      return `<span class="astatus-chip ${cls}">${s} ${c}</span>`;
    }).join('');
  }

  const grid = document.getElementById('assigneeGrid');
  grid.innerHTML = sorted.map(([name, issues], idx) => {
    const id = `assignee-drawer-${idx}`;
    const isUnassigned = name === '미배정';
    return `<div>
      <div class="assignee-row${isUnassigned ? '" style="background:#fff8e1' : '"'} onclick="toggleAssignee(this,'${id}')">
        <div class="avatar" style="background:${getColor(name)}">${avatarText(name)}</div>
        <div class="aname" title="${name}">${name}</div>
        <div class="astatuses">${chipsByStatus(issues)}</div>
        <div class="atotal">총 ${issues.length}건</div>
        <div class="arrow">›</div>
      </div>
      <div class="assignee-issues" id="${id}">
        <div class="drawer-title">${name} 담당 이슈</div>
        ${issues.map(i => `<div class="issue-item">
          <span class="priority-dot">${priorityDot(i.priority)}</span>
          <a class="ikey" href="${JIRA_BASE}/browse/${i.key}" target="_blank">${i.key}</a>
          <div class="isummary">${i.summary}</div>
          <div class="imeta">${i.status}</div>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function toggleAssignee(row, id) {
  const drawer = document.getElementById(id);
  const isOpen = drawer.classList.contains('open');
  document.querySelectorAll('.assignee-issues').forEach(d => d.classList.remove('open'));
  document.querySelectorAll('.assignee-row').forEach(r => r.classList.remove('selected'));
  document.querySelectorAll('.arrow').forEach(a => { a.textContent = '›'; });
  if (!isOpen) {
    drawer.classList.add('open');
    row.classList.add('selected');
    row.querySelector('.arrow').textContent = '⌄';
  }
}

// ── 이슈 생성 모달 ──
let _createMeta = null; // { epicLinkFieldId }
let _labelTags = [];
const _userTimers = {};

async function openCreateModal() {
  const epicKey = document.getElementById('epicInput').value.trim();
  const projectKey = epicKey ? epicKey.split('-')[0] : '';

  // 폼 초기화
  document.getElementById('newSummary').value = '';
  document.getElementById('newReporterInput').value = _currentUser?.displayName || '';
  document.getElementById('newReporterName').value = _currentUser?.name || '';
  document.getElementById('newAssigneeInput').value = '';
  document.getElementById('newAssigneeName').value = '';
  document.getElementById('newEpicLink').value = epicKey;
  document.getElementById('newDescription').value = '';
  document.getElementById('newLinkedIssue').value = '';
  document.getElementById('fileList').innerHTML = '';
  document.getElementById('newAttachment').value = '';
  document.getElementById('modalResult').style.display = 'none';
  document.getElementById('createBtn').disabled = false;
  document.getElementById('createBtn').textContent = '만들기';
  _labelTags = ['QA'];
  renderLabelTags();

  document.getElementById('createModal').style.display = 'flex';

  if (!projectKey) {
    document.getElementById('newProject').innerHTML = '<option value="">프로젝트를 먼저 입력하세요</option>';
    document.getElementById('newIssueType').innerHTML = '<option value="">유형 선택...</option>';
    document.getElementById('newPriority').innerHTML = '<option value="Medium">Medium</option>';
    return;
  }

  try {
    const [metaRes, linkRes] = await Promise.all([
      fetch(`/api/createmeta?project=${projectKey}`),
      fetch('/api/link-types'),
    ]);
    const [meta, linkData] = await Promise.all([metaRes.json(), linkRes.json()]);

    const project = meta.projects?.[0];
    if (project) {
      // 프로젝트 셀렉트
      document.getElementById('newProject').innerHTML =
        `<option value="${project.key}" selected>${project.name || project.key}</option>`;

      // 이슈 유형 셀렉트
      document.getElementById('newIssueType').innerHTML = project.issuetypes.map(t =>
        `<option value="${t.name}" ${t.name === '버그' ? 'selected' : ''}>${t.name}</option>`
      ).join('');

      // Epic Link 필드 ID + 우선순위 — 버그 또는 첫 번째 이슈 유형 기준
      const priorities = project.priorities || [];
      document.getElementById('newPriority').innerHTML = priorities.length
        ? priorities.map(p => `<option value="${p.name}" ${p.name === 'Medium' ? 'selected' : ''}>${p.name}</option>`).join('')
        : '<option value="Medium" selected>Medium</option>';

      _createMeta = { epicLinkFieldId: project.epicLinkFieldId || null };
    }

    // 링크 유형 셀렉트
    const linkTypes = linkData.issueLinkTypes || [];
    document.getElementById('newLinkType').innerHTML =
      `<option value="">링크 유형...</option>` +
      linkTypes.map(t => `<option value="${t.name}">${t.outward}</option>`).join('');

  } catch (e) {
    console.error('메타데이터 로드 실패:', e);
  }

  setTimeout(() => document.getElementById('newSummary').focus(), 50);
}

function closeCreateModal() {
  document.getElementById('createModal').style.display = 'none';
}

// ── 레이블 태그 ──
function renderLabelTags() {
  const wrap = document.getElementById('labelTagsWrap');
  const input = document.getElementById('labelInput');
  wrap.querySelectorAll('.label-tag').forEach(el => el.remove());
  _labelTags.forEach((tag, i) => {
    const el = document.createElement('span');
    el.className = 'label-tag';
    el.innerHTML = `${escHtml(tag)} <span class="tag-remove" onmousedown="removeTag(${i})">×</span>`;
    wrap.insertBefore(el, input);
  });
}

function removeTag(i) {
  _labelTags.splice(i, 1);
  renderLabelTags();
}

function onLabelKeydown(e) {
  if (e.isComposing) return; // 한글 IME 조합 중 무시
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = e.target.value.trim().replace(/,/g, '');
    if (val && !_labelTags.includes(val)) { _labelTags.push(val); renderLabelTags(); }
    e.target.value = '';
  } else if (e.key === 'Backspace' && e.target.value === '' && _labelTags.length > 0) {
    _labelTags.pop();
    renderLabelTags();
  }
}

// ── 유저 검색 ──
function onUserInput(input, dropId, hiddenId) {
  document.getElementById(hiddenId).value = '';
  clearTimeout(_userTimers[dropId]);
  const q = input.value.replace(/^@/, '').trim();
  if (q.length < 1) { hideDropdown(dropId, 0); return; }
  _userTimers[dropId] = setTimeout(() => searchUsers(q, dropId, hiddenId), 300);
}

async function searchUsers(q, dropId, hiddenId) {
  const drop = document.getElementById(dropId);
  const inputId = dropId === 'reporterDrop' ? 'newReporterInput' : 'newAssigneeInput';
  const projectKey = document.getElementById('newProject').value;
  try {
    const r = await fetch(`/api/user-search?q=${encodeURIComponent(q)}&project=${encodeURIComponent(projectKey)}`);
    const users = await r.json();
    const list = Array.isArray(users) ? users : [];
    if (list.length === 0) {
      drop.innerHTML = '<div class="user-option" style="color:#5e6c84;font-size:12px">검색 결과 없음</div>';
    } else {
      drop.innerHTML = list.map(u => `
        <div class="user-option" onmousedown="selectUser('${escHtml(u.displayName)}','${escHtml(u.name)}','${inputId}','${dropId}','${hiddenId}')">
          <span style="width:22px;height:22px;border-radius:50%;background:#dfe1e6;display:inline-flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;color:#172b4d">${escHtml(u.displayName.charAt(0))}</span>
          <span>${escHtml(u.displayName)}</span>
          <span class="user-meta">${escHtml(u.name)}</span>
        </div>`).join('');
    }
    drop.classList.add('show');
  } catch (e) { console.error('유저 검색 실패:', e); }
}

function selectUser(displayName, username, inputId, dropId, hiddenId) {
  document.getElementById(inputId).value = displayName;
  document.getElementById(hiddenId).value = username;
  hideDropdown(dropId, 0);
}

function hideDropdown(dropId, delay) {
  setTimeout(() => document.getElementById(dropId)?.classList.remove('show'), delay);
}

function escHtml(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// ── 설명 툴바 ──
function applyBold(e) {
  e.preventDefault();
  const ta = document.getElementById('newDescription');
  const full = ta.value;
  const start = ta.selectionStart, end = ta.selectionEnd;
  const selected = full.slice(start, end);
  // 케이스1: 선택 텍스트 자체가 *ㅇㅇ* 형태
  if (selected.startsWith('*') && selected.endsWith('*') && selected.length >= 3) {
    const inner = selected.slice(1, -1);
    ta.value = full.slice(0, start) + inner + full.slice(end);
    ta.selectionStart = start;
    ta.selectionEnd = start + inner.length;
  // 케이스2: 선택 텍스트 바깥에 * 가 감싸고 있는 경우 (ㅇㅇ 선택 시 *ㅇㅇ*)
  } else if (full[start - 1] === '*' && full[end] === '*') {
    ta.value = full.slice(0, start - 1) + selected + full.slice(end + 1);
    ta.selectionStart = start - 1;
    ta.selectionEnd = end - 1;
  // 케이스3: 볼드 적용
  } else {
    const text = selected || '볼드 텍스트';
    ta.value = full.slice(0, start) + `*${text}*` + full.slice(end);
    ta.selectionStart = start + 1;
    ta.selectionEnd = start + 1 + text.length;
  }
  ta.focus();
}

function applyList(e, type) {
  e.preventDefault();
  const ta = document.getElementById('newDescription');
  const start = ta.selectionStart, end = ta.selectionEnd;
  const selected = ta.value.slice(start, end);
  const lines = (selected || '').split('\n');
  const replacement = lines.map(l => '- ' + l).join('\n');
  ta.value = ta.value.slice(0, start) + replacement + ta.value.slice(end);
  ta.selectionStart = start;
  ta.selectionEnd = start + replacement.length;
  ta.focus();
}

function onDescKeydown(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'b') { e.preventDefault(); applyBold(e); }
  // Enter 키: 이전 줄이 "- "로 시작하면 다음 줄도 자동으로 "- " 추가
  if (e.key === 'Enter') {
    const ta = e.target;
    const pos = ta.selectionStart;
    const textBefore = ta.value.slice(0, pos);
    const currentLine = textBefore.split('\n').pop();
    if (currentLine.match(/^- .+/)) {
      e.preventDefault();
      const insert = '\n- ';
      ta.value = ta.value.slice(0, pos) + insert + ta.value.slice(pos);
      ta.selectionStart = ta.selectionEnd = pos + insert.length;
    } else if (currentLine === '- ') {
      // 빈 항목에서 Enter → 목록 종료
      e.preventDefault();
      ta.value = ta.value.slice(0, pos - 2) + '\n' + ta.value.slice(pos);
      ta.selectionStart = ta.selectionEnd = pos - 1;
    }
  }
}

function onDescPaste(e) {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const file = item.getAsFile();
      const ext = item.type.split('/')[1] || 'png';
      const fname = `paste-${Date.now()}.${ext}`;
      // 파일 목록에 추가
      const dt = new DataTransfer();
      const existing = document.getElementById('newAttachment').files;
      [...existing].forEach(f => dt.items.add(f));
      dt.items.add(new File([file], fname, { type: file.type }));
      document.getElementById('newAttachment').files = dt.files;
      onFilesChange();
      // 설명에 이미지 참조 삽입
      const ta = document.getElementById('newDescription');
      const pos = ta.selectionStart;
      const ref = `\n!${fname}!\n`;
      ta.value = ta.value.slice(0, pos) + ref + ta.value.slice(pos);
      ta.selectionStart = ta.selectionEnd = pos + ref.length;
      break;
    }
  }
}

// ── 첨부파일 ──
function onFilesChange() {
  const files = document.getElementById('newAttachment').files;
  document.getElementById('fileList').innerHTML = [...files].map(f =>
    `<div class="file-item">📎 ${escHtml(f.name)} <span style="color:#aaa">(${(f.size / 1024).toFixed(1)}KB)</span></div>`
  ).join('');
}

// ── 이슈 생성 제출 ──
async function submitCreateIssue() {
  const summary = document.getElementById('newSummary').value.trim();
  if (!summary) { alert('요약을 입력해주세요.'); return; }
  const projectKey = document.getElementById('newProject').value;
  if (!projectKey) { alert('프로젝트를 선택해주세요.'); return; }

  const btn = document.getElementById('createBtn');
  btn.disabled = true;
  btn.textContent = '생성 중...';
  const resultEl = document.getElementById('modalResult');
  resultEl.style.display = 'none';

  try {
    const fields = {
      project: { key: projectKey },
      summary,
      issuetype: { name: document.getElementById('newIssueType').value || '버그' },
    };

    const priority = document.getElementById('newPriority').value;
    if (priority) fields.priority = { name: priority };
    if (_labelTags.length > 0) fields.labels = _labelTags;

    const reporterName = document.getElementById('newReporterName').value;
    if (reporterName) fields.reporter = { name: reporterName };
    const assigneeName = document.getElementById('newAssigneeName').value;
    if (assigneeName) fields.assignee = { name: assigneeName };

    const description = document.getElementById('newDescription').value.trim();
    if (description) fields.description = description;

    const epicLink = document.getElementById('newEpicLink').value.trim();
    if (epicLink && _createMeta?.epicLinkFieldId) {
      fields[_createMeta.epicLinkFieldId] = epicLink;
    }

    const linkType = document.getElementById('newLinkType').value;
    const linkedIssue = document.getElementById('newLinkedIssue').value.trim();

    const r = await fetch('/api/create-issue', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fields, linkType: linkType || null, linkedIssue: linkedIssue || null }),
    });
    const d = await r.json();

    if (r.ok && d.key) {
      // 첨부파일 업로드
      const files = document.getElementById('newAttachment').files;
      if (files.length > 0) {
        btn.textContent = '파일 업로드 중...';
        const fd = new FormData();
        [...files].forEach(f => fd.append('file', f));
        await fetch(`/api/attach?key=${d.key}`, { method: 'POST', body: fd });
      }

      resultEl.className = 'modal-result ok';
      resultEl.innerHTML = `✅ 이슈 생성 완료: <a href="${JIRA_BASE}/browse/${d.key}" target="_blank" style="color:#006644;font-weight:700">${d.key}</a>`;
      resultEl.style.display = 'block';
      btn.textContent = '만들기';
      btn.disabled = false;
      document.getElementById('newSummary').value = '';
      document.getElementById('newDescription').value = '';
      document.getElementById('newAttachment').value = '';
      document.getElementById('fileList').innerHTML = '';
    } else {
      throw new Error(d.message || d.errorMessages?.[0] || JSON.stringify(d.errors || d));
    }
  } catch (e) {
    resultEl.className = 'modal-result err';
    resultEl.textContent = '❌ 생성 실패: ' + e.message;
    resultEl.style.display = 'block';
    btn.textContent = '만들기';
    btn.disabled = false;
  }
}

// 모달 외부 클릭 시 닫기 (내용 있으면 무시 — X 또는 취소 버튼으로만 닫을 수 있음)
document.getElementById('createModal').addEventListener('click', function(e) {
  if (e.target !== this) return;
  const hasContent =
    document.getElementById('newSummary').value.trim() ||
    document.getElementById('newDescription').value.trim() ||
    document.getElementById('newAssigneeName').value ||
    document.getElementById('newLinkedIssue').value.trim() ||
    _labelTags.filter(t => t !== 'QA').length > 0;
  if (!hasContent) closeCreateModal();
});

// ── 시트 링크 동적 연결 ──
document.getElementById('sheetInput').addEventListener('input', function() {
  document.getElementById('sheetLink').href = this.value;
});

// ── QA 날짜 자동 포커스 ──
document.getElementById('qaStart').addEventListener('change', function() {
  const endInput = document.getElementById('qaEnd');

  // 종료일이 시작일보다 이전이면 초기화

  if (this.value) endInput.showPicker?.() || endInput.focus();
});
document.getElementById('qaEnd').addEventListener('change', updateQaBadge);

document.getElementById('epicInput').addEventListener('keydown', e => { if (e.key === 'Enter') loadEpic(); });

// ── 스냅샷 내보내기 ──
async function exportSnapshot() {
  if (!_lastEpicData) { alert('에픽 데이터를 먼저 불러오세요.'); return; }

  const btn = document.getElementById('exportBtn');
  btn.disabled = true;
  btn.textContent = '생성 중...';

  try {
    const epicKey = document.getElementById('epicInput').value.trim();
    const qaStart = document.getElementById('qaStart').value;
    const qaEnd = document.getElementById('qaEnd').value;
    const sheetUrl = document.getElementById('sheetInput').value;
    const deployAt = document.getElementById('deployAt').value;
    const today = new Date().toISOString().slice(0, 10);
    const exportedAt = new Date().toLocaleString('ko-KR');

    // 현재 페이지 HTML 가져오기
    let html = await fetch('/').then(r => r.text());

    // 스냅샷 데이터 + 패치 스크립트 주입
    const inject = `
<script>
/* ── SNAPSHOT MODE ── */
const __SNAPSHOT__ = ${JSON.stringify({ epicKey, qaStart, qaEnd, sheetUrl, deployAt, exportedAt, data: _lastEpicData })};
window.addEventListener('DOMContentLoaded', function() {
  // 연결 상태 표시
  document.getElementById('connDot').className = 'status-dot ok';
  document.getElementById('connLabel').textContent = '스냅샷 · ' + __SNAPSHOT__.exportedAt;
  // 입력값 복원
  document.getElementById('epicInput').value = __SNAPSHOT__.epicKey;
  if (__SNAPSHOT__.qaStart) { document.getElementById('qaStart').value = __SNAPSHOT__.qaStart; }
  if (__SNAPSHOT__.qaEnd) { document.getElementById('qaEnd').value = __SNAPSHOT__.qaEnd; }
  if (__SNAPSHOT__.sheetUrl) { document.getElementById('sheetInput').value = __SNAPSHOT__.sheetUrl; }
  if (__SNAPSHOT__.deployAt) { document.getElementById('deployAt').value = __SNAPSHOT__.deployAt; updateDeployBadge(); }
  // 버튼 숨기기 (불러오기·이슈생성·내보내기)
  document.getElementById('loadBtn').style.display = 'none';
  document.getElementById('exportBtn').style.display = 'none';
  document.querySelector('[onclick="openCreateModal()"]').style.display = 'none';
  // 입력 필드 읽기 전용 + 비활성화 스타일
  const disabledStyle = 'background:#f4f5f7;color:#97a0af;cursor:not-allowed;border-color:#dfe1e6;user-select:none;pointer-events:none';
  const epicEl = document.getElementById('epicInput');
  epicEl.readOnly = true; epicEl.style.cssText += disabledStyle;
  const qaStartEl = document.getElementById('qaStart');
  qaStartEl.readOnly = true; qaStartEl.style.cssText += disabledStyle;
  const qaEndEl = document.getElementById('qaEnd');
  qaEndEl.readOnly = true; qaEndEl.style.cssText += disabledStyle;
  const sheetEl = document.getElementById('sheetInput');
  sheetEl.readOnly = true; sheetEl.style.cssText += disabledStyle;
  const deployEl = document.getElementById('deployAt');
  deployEl.readOnly = true; deployEl.style.cssText += disabledStyle;
  // 날짜 X버튼 숨기기
  document.querySelectorAll('.date-icon-cal, .date-icon-x').forEach(el => el.style.display = 'none');
  // 하단 안내 텍스트 숨기기
  document.getElementById('emptyBox').style.display = 'none';
  // QA 종료 뱃지 숨기기
  document.getElementById('updatedTag').style.display = 'none';
  // 대시보드 렌더
  updateQaBadge();
  _lastEpicData = __SNAPSHOT__.data;
  renderDashboard(__SNAPSHOT__.data);
});
<\/script>`;

    // checkConnection, loadEpic 비활성화
    html = html.replace('/* demo: disabled */', '/* snapshot: checkConnection disabled */');
    html = html.replace(
      `const r = await fetch(\`/api/epic?key=\${encodeURIComponent(key)}\`);`,
`return; const r = null;`
    );
    // 스냅샷 스크립트를 </head> 앞에 삽입
    html = html.replace('</head>', inject + '\n</head>');

    // 다운로드
    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `jira-${epicKey}-${today}.html`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(a.href), 2000);
  } finally {
    btn.disabled = false;
    btn.textContent = '내보내기';
  }
}

// ── 초기 실행 ──
restoreState();
checkConnection();
if (document.getElementById('epicInput').value.trim()) loadEpic();
